<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #2b1d17, #5c4033);
    color: #fff5e6;
}

/* Navbar */
.navbar {
    background: #5c4033;
    padding: 15px;
}

.navbar a {
    color: #ffbf00;
    margin-right: 15px;
    text-decoration: none;
    font-weight: bold;
}

/* Container */
.container {
    padding: 30px;
}

/* Title */
h2 {
    color: #ffbf00;
}

/* Cards grid */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    margin-top: 20px;
}

/* Card */
.card {
    background: linear-gradient(145deg, #fffaf0, #ffe4b5);
    color: #2b1d17;
    padding: 25px;
    border-radius: 15px;
    text-align: center;
    transition: 0.4s;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

/* Hover */
.card:hover {
    transform: translateY(-10px) scale(1.05);
    box-shadow: 0 20px 50px rgba(0,0,0,0.3);
}

/* Button */
.btn {
    display: inline-block;
    margin-top: 10px;
    padding: 10px 15px;
    background: linear-gradient(45deg, #cd7f32, #ffbf00);
    color: #2b1d17;
    border-radius: 10px;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.1);
}
</style>

</head>

<body>

<!-- Navbar -->
<div class="navbar">
    <a href="/">Home</a>
    <!-- <a href="/appointments/">Appointments</a> -->
    <a href="/admin/">Django Admin</a>
    <a href="/admin-logout/">Logout</a>
</div>

<div class="container">

<h2>Welcome Admin 👨‍⚕️</h2>

<div class="grid">

    <div class="card">
        <h3>📅 Appointments</h3>
        <p>Manage bookings</p>
        <a href="/appointments/" class="btn">View</a> 
    </div>

    <div class="card">
        <h3>👨‍⚕️ Doctors</h3>
        <p>Manage doctors</p>
        <a href="/admin/" class="btn">Manage</a>
    </div>

    <div class="card">
        <h3>⚙️ Admin Panel</h3>
        <p>Full control</p>
        <a href="/admin/" class="btn">Open</a>
    </div>

</div>

</div>

</body>
</html>
