<!DOCTYPE html>
<html>
<head>
<title>Book Appointment</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #2b1d17, #5c4033, #3e2723);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* 🌟 Card */
.container {
    width: 420px;
    padding: 35px;
    border-radius: 22px;
    background: rgba(205, 127, 50, 0.15);
    backdrop-filter: blur(20px);
    box-shadow:
        0 25px 70px rgba(0,0,0,0.6),
        inset 0 0 20px rgba(255,191,0,0.1);
    border: 1px solid rgba(255,191,0,0.3);
    animation: fadeIn 1s ease;
}

/* Animation */
@keyframes fadeIn {
    from {opacity:0; transform: translateY(30px);}
    to {opacity:1; transform: translateY(0);}
}

/* Heading */
h2 {
    text-align: center;
    color: #ffbf00;
    margin-bottom: 25px;
    letter-spacing: 1px;
}

/* Inputs */
input, select {
    width: 100%;
    padding: 14px;
    margin: 10px 0;
    border-radius: 12px;
    border: none;
    outline: none;
    background: #fff5e6;
    font-size: 15px;
    transition: 0.3s;
}

/* Focus */
input:focus, select:focus {
    box-shadow: 0 0 12px #ffbf00;
    transform: scale(1.02);
}

/* Button */
button {
    width: 100%;
    padding: 14px;
    margin-top: 15px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(45deg, #cd7f32, #ffbf00);
    color: #2b1d17;
    font-weight: bold;
    font-size: 16px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
}

/* Shine effect */
button::before {
    content: "";
    position: absolute;
    width: 0;
    height: 100%;
    background: rgba(255,255,255,0.4);
    top: 0;
    left: -50%;
    transform: skewX(-20deg);
}

button:hover::before {
    width: 200%;
    transition: 0.6s;
}

/* Hover */
button:hover {
    transform: scale(1.05);
    box-shadow: 0 8px 25px rgba(255,191,0,0.5);
}

/* Messages */
.success {
    color: #00ff99;
    text-align: center;
}

.error {
    color: red;
    text-align: center;
}

/* Footer */
.footer {
    text-align: center;
    margin-top: 15px;
    color: #ddd;
    font-size: 13px;
}

/* Hover glow */
.container:hover {
    box-shadow:
        0 30px 80px rgba(0,0,0,0.7),
        0 0 25px rgba(255,191,0,0.3);
}

/* 📱 Responsive */
@media (max-width: 500px) {
    .container {
        width: 90%;
        padding: 25px;
    }
}
</style>

</head>

<body>

<div class="container">

<h2>Book Appointment</h2>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

{% if success %}
<p class="success">✅ Appointment Booked Successfully!</p>
{% endif %}

<form method="POST">
{% csrf_token %}

<input name="name" placeholder="👤 Enter your name" required>

<input name="phone" placeholder="📞 Phone number" pattern="[0-9]{10}" required>

<input name="email" type="email" placeholder="📧 Email address" required>

<select name="doctor">
{% for d in doctors %}
<option value="{{ d.id }}">👨‍⚕️ {{ d.name }}</option>
{% endfor %}
</select>

<select name="time">
<option>⏰ 10:00 AM</option>
<option>⏰ 11:00 AM</option>
<option>⏰ 12:00 PM</option>
<option>⏰ 2:00 PM</option>
<option>⏰ 3:00 PM</option>
</select>

<input type="date" name="date" required>

<button>🚀 Book Appointment</button>

</form>

<div class="footer">
© 2026 Clinic System
</div>

</div>

</body>
</html>
